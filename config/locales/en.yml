# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  activerecord:
    errors:
      models:
        product:
          attributes:
            title:
              too_short: "is too short (minimum is 10 characters)"
              taken: "has already been used by another product"

  layouts:
    application:
      title: "The Pragmatic Bookshelf"
      home: "Home"
      questions: "Questions"
      news: "News"
      contact: "Contact"

  store:
    index:
      title_html: "Your Pragmatic Catalog"
    product:
      add_html: "Add to Cart"
    questions:
      title: "Questions"
      body: "Frequently asked questions will appear here."
    news:
      title: "News"
      body: "Latest news will appear here."
    contact:
      title: "Contact"
      body: "Contact details will appear here."

  carts:
    cart:
      title: "Your Cart"
      empty: "Empty Cart"
      checkout: "Checkout"

  number:
    currency:
      format:
        unit: "$"
        precision: 2
        separator: "."
        delimiter: ","
        format: "%u%n"

  orders:
    new:
      legend: "Please Enter Your Details"

    form:
      name: "Name"
      address_html: "Address"
      email: "Email"
      pay_type: "Pay type"
      pay_prompt_html: "Select a payment method"
      submit: "Place Order"

      pay_types:
        Check: "Check"
        Credit card: "Credit card"
        Purchase order: "Purchase order"

    check:
      routing_number: "Routing number"
      account_number: "Account number"

    cc:
      cc_number: "Credit card number"
      expiration_date: "Expiration date"

    po:
      po_number: "PO number"

  thanks: "Thank you for your order."

  i18n:
    translation_not_available: "%{locale} translation not available"
